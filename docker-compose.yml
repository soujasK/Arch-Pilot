version: "3.9"

# ---------------------------------------------------------------------------
# ArchPilot — full-stack docker-compose
#
# Services:
#   postgres   — primary data store
#   redis      — analysis result cache + task queue
#   backend    — FastAPI application
#   frontend   — React dashboard (nginx)
#   migrate    — one-shot Alembic migration runner
# ---------------------------------------------------------------------------

services:

  # -------------------------------------------------------------------------
  # PostgreSQL
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: archpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: archpilot
      POSTGRES_PASSWORD: archpilot
      POSTGRES_DB: archpilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archpilot -d archpilot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------------
  # Redis
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: archpilot-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------------------------
  # Database migrations (run once, exit)
  # -------------------------------------------------------------------------
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: archpilot-migrate
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://archpilot:archpilot@postgres:5432/archpilot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # -------------------------------------------------------------------------
  # FastAPI backend
  # -------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: archpilot-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://archpilot:archpilot@postgres:5432/archpilot
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # -------------------------------------------------------------------------
  # React frontend (nginx)
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: archpilot-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: https://arch-pilot.onrender.com/

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
